<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Валидатор форм</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="form-container">
        <h2>Валидатор формы</h2>
        
        <form id="validatorForm" novalidate>
            <div class="form-group">
                <label>Имя <span class="required">*</span></label>
                <input type="text" id="name" data-type="text" data-required="true">
                <div class="error" id="nameError"></div>
            </div>

            <div class="form-group">
                <label>Телефон <span class="required">*</span></label>
                <input type="text" id="phone" data-type="phone" data-required="true">
                <div class="error" id="phoneError"></div>
            </div>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="text" id="email" data-type="email" data-required="true">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label>Комментарий</label>
                <input type="text" id="comment" data-type="text" data-required="false">
                <div class="error" id="commentError"></div>
            </div>

            <button type="submit">Отправить</button>
        </form>

        <div id="form-message"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
